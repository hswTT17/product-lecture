  <section class="page-hero">
    <h1>제휴 문의</h1>
    <p>함께 성장할 파트너를 기다립니다. 제안을 남겨주시면 영업일 2일 내 답변드립니다.</p>
  </section>

  <section class="form-section">
    <form id="affiliateForm" action="https://formspree.io/f/mzdlvlqo" method="POST" novalidate>

      <div class="form-row two-col">
        <div class="field">
          <label for="name">담당자 이름 <span class="req">*</span></label>
          <input id="name" name="name" type="text" placeholder="홍길동" required />
          <span class="err-msg" id="err-name"></span>
        </div>
        <div class="field">
          <label for="company">회사 / 브랜드명 <span class="req">*</span></label>
          <input id="company" name="company" type="text" placeholder="(주)예시" required />
          <span class="err-msg" id="err-company"></span>
        </div>
      </div>

      <div class="form-row two-col">
        <div class="field">
          <label for="email">이메일 <span class="req">*</span></label>
          <input id="email" name="email" type="email" placeholder="hello@example.com" required />
          <span class="err-msg" id="err-email"></span>
        </div>
        <div class="field">
          <label for="phone">연락처</label>
          <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" />
          <span class="err-msg" id="err-phone"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="website">웹사이트 / SNS 링크</label>
          <input id="website" name="website" type="url" placeholder="https://example.com" />
          <span class="err-msg" id="err-website"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="type">제휴 유형 <span class="req">*</span></label>
          <select id="type" name="type" required>
            <option value="" disabled selected>제휴 유형을 선택하세요</option>
            <option value="콘텐츠 협력">콘텐츠 협력</option>
            <option value="공동 마케팅">공동 마케팅</option>
            <option value="제품·서비스 제휴">제품·서비스 제휴</option>
            <option value="광고·스폰서십">광고·스폰서십</option>
            <option value="기타">기타</option>
          </select>
          <span class="err-msg" id="err-type"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="message">제안 내용 <span class="req">*</span></label>
          <textarea id="message" name="message" rows="5"
            placeholder="제휴 목적, 기대 효과, 제안 조건 등을 자유롭게 작성해주세요." required></textarea>
          <span class="char-count"><span id="charCount">0</span> / 1000</span>
          <span class="err-msg" id="err-message"></span>
        </div>
      </div>

      <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
      <input type="hidden" name="_subject" value="[제휴 문의] 새 문의가 도착했습니다" />

      <button type="submit" id="submitBtn">
        <span class="btn-text">문의 보내기</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
    </form>
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>
  </section>
